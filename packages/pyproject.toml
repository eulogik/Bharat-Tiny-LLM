[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "bharat-tiny-llm"
version = "0.1.0"
description = "Bharat-Tiny-LLM - India's first native edge AI for Hinglish and Hindi, running on-device on ₹8,000 phones."
readme = "README.md"
requires-python = ">=3.9"
license = { text = "Apache-2.0" }
authors = [{ name = "eulogik", email = "hello@eulogik.com" }]
keywords = [
    "hinglish",
    "hindi",
    "indian-languages",
    "edge-ai",
    "llm",
    "small-language-model",
    "on-device-ai",
    "mlx",
    "apple-silicon",
    "lora",
    "qwen",
    "bharat",
    "indic-nlp",
    "low-resource",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Operating System :: MacOS",
    "Operating System :: POSIX :: Linux",
]
dependencies = ["huggingface_hub"]

[project.urls]
Homepage = "https://github.com/eulogik/Bharat-Tiny-LLM"
Documentation = "https://huggingface.co/eulogik/Bharat-Tiny-LLM"
Repository = "https://github.com/eulogik/Bharat-Tiny-LLM"
Demo = "https://huggingface.co/spaces/eulogik/Bharat-Tiny-LLM"
BuiltBy = "https://eulogik.com"

[project.optional-dependencies]
mlx = ["mlx-lm"]
torch = ["torch", "transformers"]

[tool.hatch.build.targets.wheel]
packages = ["bharat_tiny_llm"]
